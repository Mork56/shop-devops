<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop DevOps</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        header{
            background:#333;
            color:white;
            padding:15px;
            text-align:center;
        }

        nav{
            background:#444;
            padding:10px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:0 15px;
        }

        .container{
            width:90%;
            max-width:1000px;
            margin:20px auto;
        }

        .products{
            display:flex;
            gap:20px;
            flex-wrap:wrap;
            justify-content:center;
        }

        .card{
            background:white;
            width:250px;
            padding:15px;
            border-radius:8px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
            text-align:center;
        }

        .card img{
            width:100%;
            height:180px;
            object-fit:cover;
            border-radius:5px;
        }

        .price{
            color:green;
            font-size:20px;
            margin:10px 0;
        }

        button{
            background:#007bff;
            color:white;
            border:none;
            padding:10px 15px;
            border-radius:5px;
            cursor:pointer;
        }

        footer{
            margin-top:30px;
            background:#333;
            color:white;
            text-align:center;
            padding:15px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Shop DevOps</h1>
        <p>ร้านขายอุปกรณ์คอมพิวเตอร์</p>
    </header>

    <nav>
        <a href="#">หน้าแรก</a>
        <a href="#">สินค้า</a>
        <a href="#">ตะกร้า</a>
        <a href="#">ติดต่อ</a>
    </nav>

    <div class="container">

        <h2 style="text-align:center; margin-bottom:20px;">
            สินค้าแนะนำ
        </h2>

        <div class="products">

            <div class="card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Gaming Mouse</h3>
                <p class="price">499 บาท</p>
                <button>เพิ่มลงตะกร้า</button>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Mechanical Keyboard</h3>
                <p class="price">1,290 บาท</p>
                <button>เพิ่มลงตะกร้า</button>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/250x180" alt="">
                <h3>Gaming Headset</h3>
                <p class="price">890 บาท</p>
                <button>เพิ่มลงตะกร้า</button>
            </div>

        </div>

    </div>

    <footer>
        <p>Email: shop@gmail.com</p>
        <p>GitHub: https://github.com/Mork56</p>
    </footer>

</body>
</html>
